<!DOCTYPE html>
<html lang="ru" data-theme="light" data-palette="violet">
<head>
<meta charset="utf-8" />
<title>NLA · Сбер Б1Р-22R</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  /* ─── Palette tokens ─────────────────── */
  :root[data-palette="violet"]{
    --accent: #5b3aa8; --accent-soft:#ede8f8; --accent-ink:#3b2480;
    --accent-dark:#b89cff; --accent-dark-soft:#2a1e54;
  }
  :root[data-palette="blue"]{
    --accent:#1f4ed8; --accent-soft:#e4ecff; --accent-ink:#15389e;
    --accent-dark:#6fa0ff; --accent-dark-soft:#0f234f;
  }
  :root[data-palette="teal"]{
    --accent:#0e7a78; --accent-soft:#d8efee; --accent-ink:#075654;
    --accent-dark:#4dd0bd; --accent-dark-soft:#0a3837;
  }
  :root[data-palette="graphite"]{
    --accent:#2d2d33; --accent-soft:#ececef; --accent-ink:#161618;
    --accent-dark:#d4d4dc; --accent-dark-soft:#2a2a30;
  }

  /* Light (C) */
  :root[data-theme="light"]{
    --bg:#faf8f5; --bg-2:#f3efea; --surface:#ffffff; --surface-2:#fbf9f6;
    --border:#ece7df; --border-strong:#d8d1c5;
    --ink:#1a1814; --ink-2:#45413a; --muted:#8a8478; --muted-2:#b0a99c;
    --pos:#0d7a4e; --pos-soft:#d4ecdf; --neg:#c2410c; --neg-soft:#fce4d4; --warn:#b45309;
    --shadow-sm: 0 1px 2px rgba(40,30,15,.04), 0 1px 1px rgba(40,30,15,.03);
    --shadow-md: 0 1px 3px rgba(40,30,15,.06), 0 4px 14px rgba(40,30,15,.06);
    --accent-current:var(--accent); --accent-current-soft:var(--accent-soft); --accent-current-ink:var(--accent-ink);
  }
  /* Dark (B) */
  :root[data-theme="dark"]{
    --bg:#0c0e0d; --bg-2:#131614; --surface:#161917; --surface-2:#1d211e;
    --border:#262a27; --border-strong:#353a36;
    --ink:#e7ece7; --ink-2:#b8c0b8; --muted:#767e76; --muted-2:#4f574f;
    --pos:#38c172; --pos-soft:#143a23; --neg:#ef6c4e; --neg-soft:#3a1c12; --warn:#e8b75d;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow-md:0 4px 18px rgba(0,0,0,.5);
    --accent-current:var(--accent-dark); --accent-current-soft:var(--accent-dark-soft); --accent-current-ink:var(--accent-dark);
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;
    font-size:14px; line-height:1.5;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    font-feature-settings:'cv11','ss01','ss03';
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-feature-settings:'tnum','zero'}
  .num{font-variant-numeric:tabular-nums}

  /* shell */
  .shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .nav{background:var(--bg-2);border-right:1px solid var(--border);padding:20px 18px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;font-weight:700;letter-spacing:-0.01em;font-size:15px}
  .brand-mark{width:28px;height:28px;border-radius:8px;background:var(--accent-current);display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px;box-shadow:var(--shadow-sm)}
  :root[data-theme="dark"] .brand-mark{color:#0c0e0d}
  .nav-section{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin:14px 4px 6px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;color:var(--ink-2);font-size:13px;font-weight:500;cursor:default}
  .nav-item:hover{background:rgba(0,0,0,0.03);color:var(--ink)}
  :root[data-theme="dark"] .nav-item:hover{background:rgba(255,255,255,0.04)}
  .nav-item.active{background:var(--accent-current-soft);color:var(--accent-current-ink);font-weight:600}
  .nav-item i{font-size:15px;width:16px;display:inline-flex;justify-content:center}

  .main{padding:24px 36px 80px;max-width:1480px}

  /* Breadcrumbs */
  .crumbs{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;row-gap:4px}
  .crumbs a,.crumbs .current{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
  .crumbs a{color:var(--muted);text-decoration:none}
  .crumbs a:hover{color:var(--accent-current-ink)}
  .crumbs i{font-size:10px;opacity:.5}
  .crumbs .current{color:var(--ink-2)}

  /* Hero */
  .hero{
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:22px 24px; box-shadow:var(--shadow-sm); margin-bottom:18px;
  }
  .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .hero-title{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .hero-title h1{margin:0;font-size:24px;font-weight:700;letter-spacing:-0.02em;color:var(--ink)}
  .hero-secid{font:500 13px/1 'JetBrains Mono',monospace;color:var(--muted);background:var(--bg-2);padding:6px 9px;border-radius:6px}
  .hero-issuer{color:var(--muted);font-size:13px;margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;row-gap:4px;min-width:0}
  .hero-issuer .dot{width:3px;height:3px;border-radius:50%;background:var(--muted-2);flex-shrink:0}
  .hero-issuer a{color:var(--ink-2);text-decoration:none;font-weight:500;white-space:nowrap}
  .hero-issuer .fullname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1 1 auto;max-width:100%}
  .hero-issuer a:hover{color:var(--accent-current-ink)}

  .hero-actions{display:flex;gap:8px;align-items:center}
  .star-btn{
    width:36px;height:36px;border-radius:9px;background:var(--bg-2);border:1px solid var(--border);
    color:var(--muted);display:grid;place-items:center;font-size:16px;cursor:default;
  }
  .star-btn.fav{background:var(--accent-current-soft);color:var(--accent-current-ink);border-color:transparent}

  .hero-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  .tag{font:500 10.5px/1 'Inter',sans-serif;padding:4px 8px;border-radius:5px;border:1px solid var(--border-strong);color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
  .tag.live{background:var(--pos-soft);color:var(--pos);border-color:transparent}
  .tag.live .pulse{display:inline-block;width:5px;height:5px;border-radius:50%;background:currentColor;margin-right:5px;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .rt{font:600 11px/1 'JetBrains Mono',monospace;padding:4px 7px;border-radius:5px;letter-spacing:0.02em;border:1px solid transparent}
  .rt.aaa{background:#dff5e8;color:#0d6e3a;border-color:#bfe9d0}
  :root[data-theme="dark"] .rt.aaa{background:#143a23;color:#7ee0a3;border-color:#1f5232}

  /* KPI strip */
  .kpis{
    display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:0;
    margin-top:20px;border-top:1px solid var(--border);padding-top:18px;
  }
  .kpi{padding-right:18px;border-right:1px solid var(--border)}
  .kpi:last-child{border-right:0;padding-right:0}
  .kpi-lbl{font-size:10.5px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .kpi-val{font:600 24px/1 'JetBrains Mono',monospace;letter-spacing:-0.02em;color:var(--ink);display:flex;align-items:baseline;gap:4px}
  .kpi-val .unit{font-size:13px;color:var(--muted-2);font-weight:500;letter-spacing:0}
  .kpi-val.up{color:var(--pos)}
  .kpi-sub{font-size:11.5px;color:var(--muted);margin-top:5px;font-family:'JetBrains Mono',monospace}
  .kpi-sub.up{color:var(--pos)} .kpi-sub.down{color:var(--neg)}

  /* tabs */
  .tabs{display:flex;gap:4px;background:var(--bg-2);border:1px solid var(--border);border-radius:11px;padding:3px;margin-bottom:18px;overflow-x:auto}
  .tab{
    height:36px;padding:0 14px;border-radius:8px;border:0;background:transparent;
    color:var(--muted);font:500 13px/1 'Inter',sans-serif;display:inline-flex;align-items:center;gap:7px;
    white-space:nowrap;cursor:default;
  }
  .tab i{font-size:14px}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--surface);color:var(--ink);font-weight:600;box-shadow:var(--shadow-sm)}
  .tab .count{font:500 10px/1 'JetBrains Mono',monospace;background:var(--accent-current-soft);color:var(--accent-current-ink);padding:3px 6px;border-radius:4px;letter-spacing:0.02em}

  /* panels */
  .row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
  @media (max-width:1080px){.row{grid-template-columns:1fr}}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-sm);overflow:hidden}
  .panel-head{
    display:flex;align-items:center;gap:10px;padding:14px 18px;
    border-bottom:1px solid var(--border);background:var(--surface-2);
  }
  .panel-head i{font-size:14px;color:var(--accent-current-ink)}
  :root[data-theme="dark"] .panel-head i{color:var(--accent-current)}
  .panel-head h3{margin:0;font-size:13px;font-weight:600;letter-spacing:-0.005em;color:var(--ink);text-transform:none}
  .panel-head .meta{margin-left:auto;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}

  .info-row{
    display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:baseline;
    padding:9px 18px;border-top:1px solid var(--border);
  }
  .info-row:first-child{border-top:0}
  .info-lbl{color:var(--muted);font-size:12.5px}
  .info-val{color:var(--ink);font-size:13px;font-weight:500;text-align:right;font-variant-numeric:tabular-nums}
  .info-val.mono{font-family:'JetBrains Mono',monospace;font-weight:500}
  .info-val.muted{color:var(--muted-2)}

  /* life progress */
  .progress-block{padding:16px 18px}
  .progress-meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:8px}
  .progress-meta b{color:var(--ink-2);font-weight:500;font-family:'JetBrains Mono',monospace}
  .progress-bar{height:6px;background:var(--bg-2);border-radius:99px;overflow:hidden;position:relative}
  .progress-fill{height:100%;background:var(--accent-current);border-radius:99px;position:relative}
  .progress-fill::after{content:"";position:absolute;right:-3px;top:-3px;width:12px;height:12px;border-radius:50%;background:var(--accent-current);box-shadow:0 0 0 3px var(--surface)}
  .progress-foot{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:7px;font-family:'JetBrains Mono',monospace}

  /* AI tab specific */
  .ai-grid{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr);gap:16px}
  @media (max-width:1080px){.ai-grid{grid-template-columns:1fr}}

  .form-block{padding:18px}
  .field-lbl{display:block;font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  .code-block{
    background:var(--bg-2);border:1px solid var(--border);border-radius:8px;
    padding:12px 14px;font:500 12px/1.55 'JetBrains Mono',monospace;color:var(--ink-2);
    max-height:220px;overflow:auto;white-space:pre;
    scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent;
  }
  .code-block::-webkit-scrollbar{width:8px;height:8px}
  .code-block::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
  .hint{font-size:11.5px;margin-top:7px;display:flex;align-items:center;gap:6px}
  .hint.ok{color:var(--pos)}
  .hint.warn{color:var(--warn)}
  .textarea{
    width:100%;min-height:78px;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;color:var(--ink);font:500 12.5px/1.5 'JetBrains Mono',monospace;resize:vertical;
  }
  .textarea:focus{outline:none;border-color:var(--accent-current)}
  .submit-btn{
    height:38px;padding:0 16px;background:var(--accent-current);color:#fff;border:0;border-radius:9px;
    font:600 13px/1 'Inter',sans-serif;display:inline-flex;align-items:center;gap:8px;cursor:default;
    box-shadow:var(--shadow-sm);
  }
  :root[data-theme="dark"] .submit-btn{color:#0c0e0d}
  .submit-btn:hover{filter:brightness(1.05)}

  /* History list */
  .hist-item{
    padding:12px 16px;border-top:1px solid var(--border);
    display:flex;flex-direction:column;gap:6px;cursor:default;
  }
  .hist-item:first-child{border-top:0}
  .hist-item:hover{background:var(--surface-2)}
  .hist-item.active{background:var(--accent-current-soft)}
  .hist-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .hist-meta{display:flex;align-items:center;gap:8px}
  .ai-score{
    font:600 11px/1 'JetBrains Mono',monospace;padding:4px 7px;border-radius:5px;
    display:inline-flex;align-items:center;gap:4px;
  }
  .ai-score .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
  .ai-score.s-high{background:#dff5e8;color:#0d6e3a}
  .ai-score.s-med{background:#fff5d8;color:#7a5800}
  .ai-score.s-low{background:#ffe6d4;color:#8a3d00}
  :root[data-theme="dark"] .ai-score.s-high{background:#143a23;color:#7ee0a3}
  :root[data-theme="dark"] .ai-score.s-med{background:#3a2f0e;color:#e8c468}
  :root[data-theme="dark"] .ai-score.s-low{background:#3a1f0d;color:#e89b5e}
  .hist-time{font:500 11px/1 'JetBrains Mono',monospace;color:var(--muted)}
  .hist-preview{font-size:11.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hist-actions{display:flex;align-items:center;gap:4px;color:var(--muted-2);font-size:13px}

  /* AI result */
  .ai-result-head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border)}
  .ai-result-body{padding:18px;font-size:13.5px;line-height:1.65;color:var(--ink-2)}
  .ai-result-body h2{font-size:16px;font-weight:600;color:var(--ink);margin:18px 0 8px;letter-spacing:-0.005em}
  .ai-result-body h2:first-child{margin-top:0}
  .ai-result-body p{margin:0 0 10px}
  .ai-result-body strong{color:var(--ink);font-weight:600}
  .ai-result-body ul{padding-left:20px;margin:8px 0}
  .ai-result-body li{margin:4px 0}
  .ai-result-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12.5px}
  .ai-result-body th{background:var(--bg-2);text-align:left;padding:8px 10px;font-weight:600;color:var(--ink);border-bottom:1px solid var(--border)}
  .ai-result-body td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--ink-2)}
  .ai-result-body td.num{font-family:'JetBrains Mono',monospace;text-align:right}

  /* Stats grid */
  .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0}
  .stat-cell{padding:18px;text-align:center;border-right:1px solid var(--border)}
  .stat-cell:last-child{border-right:0}
  .stat-num{font:700 26px/1 'JetBrains Mono',monospace;color:var(--ink);letter-spacing:-0.02em}
  .stat-num .ai-score{font-size:18px;padding:6px 10px}
  .stat-lbl{font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:0.02em}

  /* Theme switcher */
  .theme-pill{display:inline-flex;background:var(--bg-2);border:1px solid var(--border);border-radius:9px;padding:2px}
  .theme-pill button{height:26px;width:30px;border:0;background:transparent;border-radius:7px;color:var(--muted);font-size:13px;display:inline-flex;align-items:center;justify-content:center}
  .theme-pill button.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}

  .head-actions{display:flex;gap:8px;align-items:center;margin-left:auto}

  /* ── Chart tab ──────────────── */
  .chart-toolbar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .seg{display:inline-flex;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:2px}
  .seg button{height:26px;padding:0 10px;border:0;background:transparent;border-radius:6px;color:var(--muted);font:500 12px/1 'Inter';cursor:default}
  .seg button.active{background:var(--surface);color:var(--ink);font-weight:600;box-shadow:var(--shadow-sm)}
  .legend{display:inline-flex;gap:14px;align-items:center;font-size:11.5px;color:var(--muted)}
  .legend .swatch{width:10px;height:2px;border-radius:1px;display:inline-block;margin-right:5px;vertical-align:middle}
  .chart-stage{position:relative;padding:16px 12px 24px;background:linear-gradient(to bottom, var(--surface) 0%, var(--surface-2) 100%)}
  .chart-tt{position:absolute;background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:9px 11px;box-shadow:var(--shadow-md);font-size:11.5px;pointer-events:none;min-width:130px}
  .chart-tt .tt-date{font:500 11px/1 'JetBrains Mono',monospace;color:var(--muted);margin-bottom:4px}
  .chart-tt .tt-row{display:flex;justify-content:space-between;gap:14px;margin-top:3px;align-items:center}
  .chart-tt .tt-row b{font-family:'JetBrains Mono',monospace;color:var(--ink);font-weight:600}
  .chart-tt .swatch{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:6px;vertical-align:middle}
  .chart-stats{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border)}
  .chart-stats .stat-cell{padding:14px 18px;text-align:left;border-right:1px solid var(--border)}
  .chart-stats .stat-num{font:600 18px/1.2 'JetBrains Mono',monospace}
  .chart-stats .stat-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;margin-top:5px}

  /* ── Coupons tab ────────────── */
  .coupon-summary{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
  .cs-cell{padding:14px 18px;border-right:1px solid var(--border)}
  .cs-cell:last-child{border-right:0}
  .cs-lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
  .cs-val{font:600 18px/1.1 'JetBrains Mono',monospace;color:var(--ink)}
  .cs-val.up{color:var(--pos)}
  .cs-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}

  .coupon-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
  .coupon-tbl th{
    background:var(--surface-2);position:sticky;top:0;
    text-align:left;padding:9px 14px;font:600 10.5px/1 'Inter';
    text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);
    border-bottom:1px solid var(--border);
  }
  .coupon-tbl th.right{text-align:right}
  .coupon-tbl td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--ink-2);vertical-align:middle}
  .coupon-tbl td.right{text-align:right;font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;color:var(--ink)}
  .coupon-tbl tr.paid td{color:var(--muted)}
  .coupon-tbl tr.paid td.right{color:var(--muted)}
  .coupon-tbl tr.next{background:var(--accent-current-soft)}
  .coupon-tbl tr.next td{color:var(--accent-current-ink);font-weight:600}
  :root[data-theme="dark"] .coupon-tbl tr.next td{color:var(--accent-current)}

/* ─── Chart tab ────────────────────────────── */
function ChartTab(){
  const [range, setRange] = useState("3M");
  const ranges = ["1W","1M","3M","6M","1Y","All"];

  // generated price/yield series
  const N = 60;
  const W = 1080, H = 280, PAD_L = 50, PAD_R = 50, PAD_T = 12, PAD_B = 26;
  const data = React.useMemo(()=>{
    const a = []; let p = 98.6, y = 13.95;
    for (let i=0;i<N;i++){
      p += (Math.sin(i/4.2)*0.18 + (Math.random()-0.5)*0.22 + (i>40 ? 0.04 : 0));
      y += -((Math.sin(i/4.2)*0.06 + (Math.random()-0.5)*0.07 + (i>40 ? 0.012 : 0))) ;
      a.push({i, p:Math.max(96, Math.min(101, p)), y:Math.max(12.4, Math.min(15, y)),
              date:`${String((i%28)+1).padStart(2,'0')}.${i<30?'10':'11'}.25`});
    }
    return a;
  },[]);

  const xs = i => PAD_L + (i/(N-1))*(W-PAD_L-PAD_R);
  const pMin = 96.5, pMax = 100.5;
  const yMin = 12.5, yMax = 14.8;
  const ysP = v => PAD_T + (1-(v-pMin)/(pMax-pMin)) * (H-PAD_T-PAD_B);
  const ysY = v => PAD_T + (1-(v-yMin)/(yMax-yMin)) * (H-PAD_T-PAD_B);

  const linePath = (key, scale) => data.map((d,i)=>`${i?'L':'M'}${xs(i).toFixed(1)},${scale(d[key]).toFixed(1)}`).join(' ');
  const areaPath = (key, scale) => `${linePath(key,scale)} L${xs(N-1).toFixed(1)},${(H-PAD_B).toFixed(1)} L${xs(0).toFixed(1)},${(H-PAD_B).toFixed(1)} Z`;

  const [hover, setHover] = useState(40);
  const cur = data[hover];

  const last = data[N-1], first = data[0];

  return (
    <div className="panel">
      <div className="chart-toolbar">
        <div className="seg">
          {ranges.map(r => <button key={r} className={r===range?'active':''} onClick={()=>setRange(r)}>{r}</button>)}
        </div>
        <div className="legend" style={{marginLeft:'auto'}}>
          <span><span className="swatch" style={{background:'var(--accent-current)'}}/>Цена, %</span>
          <span><span className="swatch" style={{background:'var(--pos)'}}/>Доходность, %</span>
          <span><span className="swatch" style={{background:'var(--muted-2)',height:'1px',borderTop:'1px dashed var(--muted-2)'}}/>OFZ benchmark</span>
        </div>
      </div>
      <div className="chart-stage">
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block'}} onMouseMove={e=>{
          const r = e.currentTarget.getBoundingClientRect();
          const x = (e.clientX - r.left) * (W/r.width);
          const i = Math.max(0, Math.min(N-1, Math.round((x-PAD_L)/((W-PAD_L-PAD_R)/(N-1)))));
          setHover(i);
        }}>
          <defs>
            <linearGradient id="grad-price" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stopColor="var(--accent-current)" stopOpacity="0.22"/>
              <stop offset="100%" stopColor="var(--accent-current)" stopOpacity="0"/>
            </linearGradient>
          </defs>
          {/* price grid */}
          {[97,98,99,100].map(v => (
            <g key={v}>
              <line x1={PAD_L} x2={W-PAD_R} y1={ysP(v)} y2={ysP(v)} stroke="var(--border)" strokeDasharray="2 4"/>
              <text x={PAD_L-8} y={ysP(v)+3} textAnchor="end" fontSize="10" fontFamily="JetBrains Mono" fill="var(--muted)">{v.toFixed(0)}</text>
            </g>
          ))}
          {/* yield grid right */}
          {[13,13.5,14,14.5].map(v => (
            <text key={v} x={W-PAD_R+8} y={ysY(v)+3} textAnchor="start" fontSize="10" fontFamily="JetBrains Mono" fill="var(--pos)" opacity=".7">{v.toFixed(1)}</text>
          ))}
          {/* x labels */}
          {[0,15,30,45,59].map(i => (
            <text key={i} x={xs(i)} y={H-8} textAnchor="middle" fontSize="10" fontFamily="JetBrains Mono" fill="var(--muted)">{data[i].date}</text>
          ))}
          {/* OFZ benchmark dashed */}
          <path d={data.map((d,i)=>`${i?'L':'M'}${xs(i).toFixed(1)},${ysY(d.y-1.8).toFixed(1)}`).join(' ')} fill="none" stroke="var(--muted-2)" strokeWidth="1" strokeDasharray="3 3"/>
          {/* area */}
          <path d={areaPath('p', ysP)} fill="url(#grad-price)"/>
          {/* yield line */}
          <path d={linePath('y', ysY)} fill="none" stroke="var(--pos)" strokeWidth="1.5"/>
          {/* price line */}
          <path d={linePath('p', ysP)} fill="none" stroke="var(--accent-current)" strokeWidth="2"/>
          {/* hover */}
          <line x1={xs(hover)} x2={xs(hover)} y1={PAD_T} y2={H-PAD_B} stroke="var(--ink)" strokeOpacity=".15"/>
          <circle cx={xs(hover)} cy={ysP(cur.p)} r="4" fill="var(--accent-current)" stroke="var(--surface)" strokeWidth="2"/>
          <circle cx={xs(hover)} cy={ysY(cur.y)} r="3" fill="var(--pos)" stroke="var(--surface)" strokeWidth="2"/>
        </svg>
        <div className="chart-tt" style={{left: `${(xs(hover)/W)*100}%`, top: 14, transform:'translateX(-50%)'}}>
          <div className="tt-date">{cur.date}</div>
          <div className="tt-row"><span><span className="swatch" style={{background:'var(--accent-current)'}}/>Цена</span><b>{cur.p.toFixed(2)}%</b></div>
          <div className="tt-row"><span><span className="swatch" style={{background:'var(--pos)'}}/>YTM</span><b>{cur.y.toFixed(2)}%</b></div>
          <div className="tt-row"><span><span className="swatch" style={{background:'var(--muted-2)'}}/>Спред к ОФЗ</span><b>+{((cur.y-1.8)-(cur.y-2.6)).toFixed(2)*100|0} б.п.</b></div>
        </div>
      </div>
      <div className="chart-stats">
        <div className="stat-cell"><div className="stat-num">{last.p.toFixed(2)}</div><div className="stat-lbl" style={{color:'var(--muted)'}}>Last · цена</div></div>
        <div className="stat-cell"><div className="stat-num" style={{color:'var(--pos)'}}>+{(last.p-first.p).toFixed(2)}</div><div className="stat-lbl" style={{color:'var(--muted)'}}>Изм. за период</div></div>
        <div className="stat-cell"><div className="stat-num">{Math.max(...data.map(d=>d.p)).toFixed(2)} / {Math.min(...data.map(d=>d.p)).toFixed(2)}</div><div className="stat-lbl" style={{color:'var(--muted)'}}>Hi / Lo</div></div>
        <div className="stat-cell" style={{borderRight:0}}><div className="stat-num">85,4 М ₽</div><div className="stat-lbl" style={{color:'var(--muted)'}}>Avg оборот / день</div></div>
      </div>
    </div>
  );
}

          <div className="panel-head"><i className="bi bi-bar-chart-line"/><h3>Качество эмитента</h3><span className="meta">по dohod.ru</span></div>
          <div className="quality-block">
            {QUALITY.map(q => (
              <div key={q.lbl} className="qbar">
                <span className="qbar-lbl">{q.lbl}</span>
                <span className="qbar-track"><span className="qbar-fill pos" style={{width:`${q.v*10}%`}}/></span>
                <span className="qbar-val">{q.v.toFixed(1)}</span>
              </div>
            ))}
            <div style={{borderTop:'1px solid var(--border)',marginTop:14,paddingTop:14,display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
              <span style={{fontSize:12,color:'var(--muted)'}}>Сводный балл</span>
              <span style={{font:"700 22px/1 'JetBrains Mono',monospace",color:'var(--pos)'}}>8,8 / 10</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function StubTab({ icon, label, hint }){
  return (
    <div className="panel" style={{padding:'48px 24px',textAlign:'center'}}>
      <i className={"bi bi-" + icon} style={{fontSize:34,color:'var(--muted-2)'}}/>
      <h3 style={{margin:'12px 0 4px',fontSize:15,fontWeight:600,color:'var(--ink-2)'}}>{label}</h3>
      <p style={{color:'var(--muted)',fontSize:13,margin:0}}>{hint}</p>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "violet",
  "theme": "light"
}/*EDITMODE-END*/;

function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = useState("basic");

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', t.theme);
    document.documentElement.setAttribute('data-palette', t.palette);
  }, [t.theme, t.palette]);

  return (
    <>
      <div className="shell">
        <Sidebar/>
        <main className="main">
          <div className="crumbs">
            <a href="index.html">Облигации</a><i className="bi bi-chevron-right"/>
            <a href="index.html">{BOND.issuer.name}</a><i className="bi bi-chevron-right"/>
            <span className="current">{BOND.name}</span>
          </div>

          <Hero bond={BOND} theme={t.theme} onTheme={v=>setTweak('theme',v)}/>

          <div className="tabs" role="tablist">
            {TABS.map(T => (
              <button
                key={T.id}
                className={"tab" + (tab===T.id ? " active":"")}
                onClick={()=>setTab(T.id)}
              >
                <i className={"bi bi-" + T.icon}/>
                {T.label}
                {T.count != null && <span className="count">{T.count}</span>}
              </button>
            ))}
          </div>

          {tab === "basic"   && <BasicTab bond={BOND}/>}
          {tab === "ai"      && <AiTab/>}
          {tab === "chart"   && <ChartTab/>}
          {tab === "coupons" && <CouponsTab/>}
          {tab === "trades"  && <TradesTab/>}
          {tab === "issuer"  && <IssuerTab/>}
        </main>
      </div>

      <TweaksPanel>
        <TweakSection label="Тема"/>
        <TweakRadio label="Mode" value={t.theme} options={['light','dark']} onChange={v=>setTweak('theme',v)}/>
        <TweakSection label="Палитра"/>
        <TweakRadio label="Палитра" value={t.palette} options={['violet','blue','teal','graphite']} onChange={v=>setTweak('palette',v)}/>
        <TweakSection label="Активная вкладка"/>
        <TweakSelect label="Tab" value={tab} options={TABS.map(T=>T.id)} onChange={v=>setTab(v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
