services:
  # Go API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nla-api
    expose:
      - "8080"
    environment:
      - PORT=8080
      - ENVIRONMENT=development
      - POSTGRES_DSN=postgres://nla:nla_secret@postgres:5432/nla?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required, set it in .env}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.1-2025-11-13}
      - OPENAI_PROXY=
      - OPENAI_TIMEOUT=${OPENAI_TIMEOUT:-200}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nla-net

  # PostgreSQL — single backing store for everything except MOEX cache (in-memory).
  postgres:
    image: postgres:16-alpine
    container_name: nla-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: nla
      POSTGRES_PASSWORD: nla_secret
      POSTGRES_DB: nla
    volumes:
      - nla-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nla"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nla-net

  # Frontend = static SSG SPA + reverse proxy to api. No Node at runtime.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nla-frontend
    ports:
      - "8090:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - nla-net

volumes:
  nla-pgdata:

networks:
  nla-net:
    driver: bridge
